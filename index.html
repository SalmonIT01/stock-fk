<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>จัดการสต็อกของ</title>

<!-- PWA / Add to Home Screen support -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3f6f52">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="สต็อกของ">
<style>
  :root{
    --bg:#f6f5f2;
    --card:#ffffff;
    --border:#dedad2;
    --text:#2b2b28;
    --muted:#7a766d;
    --accent:#3f6f52;
    --accent-dark:#2f5540;
    --danger:#b3462c;
    --danger-dark:#8f3722;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:40px;
  }
  header{
    padding:18px 16px 10px;
    max-width:520px;
    margin:0 auto;
  }
  h1{
    font-size:20px;
    margin:0 0 4px;
  }
  .sub{
    color:var(--muted);
    font-size:13px;
    margin:0;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:0 16px;
  }
  .search-box{
    margin:14px 0;
  }
  .search-box input{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:15px;
    background:var(--card);
  }
  table{
    width:100%;
    border-collapse:collapse;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }
  th,td{
    text-align:left;
    padding:12px 14px;
    font-size:15px;
    border-bottom:1px solid var(--border);
  }
  th{
    background:#efece5;
    font-size:13px;
    color:var(--muted);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.03em;
  }
  tr:last-child td{
    border-bottom:none;
  }
  td.qty{
    text-align:right;
    font-variant-numeric:tabular-nums;
    font-weight:600;
  }
  .empty-row td{
    text-align:center;
    color:var(--muted);
    padding:28px 14px;
  }
  .btn-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin:16px 0;
  }
  button{
    font-family:inherit;
    font-size:14px;
    padding:10px 14px;
    border-radius:9px;
    border:1px solid transparent;
    cursor:pointer;
  }
  .btn-primary{
    background:var(--accent);
    color:#fff;
    flex:1 1 auto;
  }
  .btn-primary:active{ background:var(--accent-dark); }
  .btn-secondary{
    background:#fff;
    color:var(--text);
    border:1px solid var(--border);
    flex:1 1 auto;
  }
  .btn-danger{
    background:#fff;
    color:var(--danger);
    border:1px solid var(--danger);
    flex:1 1 auto;
  }
  .btn-danger:active{ background:#fbeae5; }

  /* modal */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(20,18,14,.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:#fff;
    width:100%;
    max-width:520px;
    border-radius:16px 16px 0 0;
    padding:20px 18px 24px;
    animation:slideup .18s ease-out;
  }
  @keyframes slideup{
    from{ transform:translateY(20px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  .modal h2{
    font-size:17px;
    margin:0 0 14px;
  }
  .field{
    margin-bottom:12px;
  }
  .field label{
    display:block;
    font-size:13px;
    color:var(--muted);
    margin-bottom:5px;
  }
  .field input, .field select{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--border);
    border-radius:9px;
    font-size:15px;
    background:#fff;
  }
  .modal-actions{
    display:flex;
    gap:8px;
    margin-top:16px;
  }
  .item-list{
    max-height:220px;
    overflow-y:auto;
    border:1px solid var(--border);
    border-radius:9px;
    margin-top:4px;
  }
  .item-list-row{
    padding:10px 12px;
    font-size:14px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    cursor:pointer;
  }
  .item-list-row:last-child{ border-bottom:none; }
  .item-list-row.selected{
    background:#eaf1ec;
    font-weight:600;
  }
  .item-list-row .n{ color:var(--muted); }
  .item-list-empty{
    padding:14px 12px;
    color:var(--muted);
    font-size:13px;
    text-align:center;
  }
  .hint{
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
  }
  .toast{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    background:#2b2b28;
    color:#fff;
    padding:10px 18px;
    border-radius:20px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s;
    z-index:60;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<header>
  <h1>📦 จัดการสต็อกของ</h1>
  <p class="sub">รายการของและจำนวนคงเหลือ</p>
</header>

<div class="wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ค้นหาชื่อของ...">
  </div>

  <table>
    <thead>
      <tr><th>ชื่อของ</th><th style="text-align:right;">จำนวน</th></tr>
    </thead>
    <tbody id="tableBody">
      <tr class="empty-row"><td colspan="2">ยังไม่มีรายการ</td></tr>
    </tbody>
  </table>

  <div class="btn-row">
    <button class="btn-primary" onclick="openAddModal()">+ เพิ่มรายการ</button>
    <button class="btn-secondary" onclick="openAdjustModal()">เพิ่มจำนวน</button>
  </div>
  <div class="btn-row">
    <button class="btn-danger" onclick="openDeleteModal()">ลบรายการ</button>
    <button class="btn-secondary" onclick="openResetModal()">รีเซ็ตทั้งหมด</button>
  </div>
</div>

<!-- Add item modal -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <h2>เพิ่มรายการใหม่</h2>
    <div class="field">
      <label for="addName">ชื่อของ *</label>
      <input type="text" id="addName" placeholder="เช่น น้ำดื่ม 600ml">
    </div>
    <div class="field">
      <label for="addQty">จำนวนเริ่มต้น (ไม่ใส่ = 0)</label>
      <input type="number" id="addQty" placeholder="0" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('addOverlay')">ยกเลิก</button>
      <button class="btn-primary" onclick="submitAdd()">เพิ่ม</button>
    </div>
  </div>
</div>

<!-- Adjust (increase) quantity modal -->
<div class="overlay" id="adjustOverlay">
  <div class="modal">
    <h2>เพิ่มจำนวนของ</h2>
    <div class="field">
      <label for="adjustSearch">ค้นหารายการ</label>
      <input type="text" id="adjustSearch" placeholder="พิมพ์เพื่อค้นหา..." oninput="renderAdjustList()">
    </div>
    <div class="field">
      <label>เลือกรายการ</label>
      <div class="item-list" id="adjustList"></div>
    </div>
    <div class="field">
      <label for="adjustQty">จำนวนที่ต้องการเพิ่ม</label>
      <input type="number" id="adjustQty" placeholder="0" min="1">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('adjustOverlay')">ยกเลิก</button>
      <button class="btn-primary" onclick="submitAdjust()">เพิ่มจำนวน</button>
    </div>
  </div>
</div>

<!-- Delete item modal -->
<div class="overlay" id="deleteOverlay">
  <div class="modal">
    <h2>ลบรายการ</h2>
    <div class="field">
      <label for="deleteSearch">ค้นหารายการ</label>
      <input type="text" id="deleteSearch" placeholder="พิมพ์เพื่อค้นหา..." oninput="renderDeleteList()">
    </div>
    <div class="field">
      <label>เลือกรายการที่จะลบ</label>
      <div class="item-list" id="deleteList"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('deleteOverlay')">ยกเลิก</button>
      <button class="btn-danger" onclick="submitDelete()">ลบรายการนี้</button>
    </div>
  </div>
</div>

<!-- Reset confirm modal -->
<div class="overlay" id="resetOverlay">
  <div class="modal">
    <h2>รีเซ็ตตารางทั้งหมด</h2>
    <p class="hint" style="font-size:14px;color:var(--text);">รายการของทั้งหมดจะถูกลบออก ไม่สามารถกู้คืนได้ ยืนยันหรือไม่?</p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('resetOverlay')">ยกเลิก</button>
      <button class="btn-danger" onclick="submitReset()">ยืนยันรีเซ็ต</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'stockItems';
  let items = [];
  let selectedAdjustId = null;
  let selectedDeleteId = null;

  function loadItems(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      items = raw ? JSON.parse(raw) : [];
    }catch(e){
      items = [];
    }
  }

  function saveItems(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 1600);
  }

  function renderTable(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const tbody = document.getElementById('tableBody');
    let list = items;
    if(q){
      list = items.filter(it => it.name.toLowerCase().includes(q));
    }
    // sort by name for stable readable order
    list = [...list].sort((a,b)=> a.name.localeCompare(b.name, 'th'));

    if(list.length === 0){
      tbody.innerHTML = `<tr class="empty-row"><td colspan="2">${q ? 'ไม่พบรายการที่ค้นหา' : 'ยังไม่มีรายการ'}</td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(it => `
      <tr>
        <td>${escapeHtml(it.name)}</td>
        <td class="qty">${it.qty}</td>
      </tr>
    `).join('');
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById('searchInput').addEventListener('input', renderTable);

  // ---------- Add item ----------
  function openAddModal(){
    document.getElementById('addName').value = '';
    document.getElementById('addQty').value = '';
    document.getElementById('addOverlay').classList.add('show');
  }

  function submitAdd(){
    const name = document.getElementById('addName').value.trim();
    let qty = document.getElementById('addQty').value;
    if(!name){
      showToast('กรุณาใส่ชื่อของ');
      return;
    }
    qty = qty === '' ? 0 : parseInt(qty, 10);
    if(isNaN(qty) || qty < 0) qty = 0;

    const exists = items.find(it => it.name.toLowerCase() === name.toLowerCase());
    if(exists){
      exists.qty += qty;
      showToast('มีรายการนี้อยู่แล้ว บวกจำนวนให้แล้ว');
    }else{
      items.push({ id: uid(), name, qty });
      showToast('เพิ่มรายการแล้ว');
    }
    saveItems();
    renderTable();
    closeModal('addOverlay');
  }

  // ---------- Adjust (increase) quantity ----------
  function openAdjustModal(){
    document.getElementById('adjustSearch').value = '';
    document.getElementById('adjustQty').value = '';
    selectedAdjustId = null;
    renderAdjustList();
    document.getElementById('adjustOverlay').classList.add('show');
  }

  function renderAdjustList(){
    const q = document.getElementById('adjustSearch').value.trim().toLowerCase();
    const container = document.getElementById('adjustList');
    let list = items;
    if(q) list = items.filter(it => it.name.toLowerCase().includes(q));
    list = [...list].sort((a,b)=> a.name.localeCompare(b.name, 'th'));

    if(list.length === 0){
      container.innerHTML = `<div class="item-list-empty">ไม่มีรายการในสต็อก</div>`;
      return;
    }
    container.innerHTML = list.map(it => `
      <div class="item-list-row ${it.id === selectedAdjustId ? 'selected' : ''}" onclick="selectAdjustItem('${it.id}')">
        <span>${escapeHtml(it.name)}</span>
        <span class="n">${it.qty}</span>
      </div>
    `).join('');
  }

  function selectAdjustItem(id){
    selectedAdjustId = id;
    renderAdjustList();
  }

  function submitAdjust(){
    if(!selectedAdjustId){
      showToast('กรุณาเลือกรายการก่อน');
      return;
    }
    const qtyVal = parseInt(document.getElementById('adjustQty').value, 10);
    if(isNaN(qtyVal) || qtyVal <= 0){
      showToast('กรุณาใส่จำนวนที่มากกว่า 0');
      return;
    }
    const item = items.find(it => it.id === selectedAdjustId);
    if(item){
      item.qty += qtyVal;
      saveItems();
      renderTable();
      showToast(`เพิ่มจำนวน ${item.name} แล้ว`);
    }
    closeModal('adjustOverlay');
  }

  // ---------- Delete item ----------
  function openDeleteModal(){
    document.getElementById('deleteSearch').value = '';
    selectedDeleteId = null;
    renderDeleteList();
    document.getElementById('deleteOverlay').classList.add('show');
  }

  function renderDeleteList(){
    const q = document.getElementById('deleteSearch').value.trim().toLowerCase();
    const container = document.getElementById('deleteList');
    let list = items;
    if(q) list = items.filter(it => it.name.toLowerCase().includes(q));
    list = [...list].sort((a,b)=> a.name.localeCompare(b.name, 'th'));

    if(list.length === 0){
      container.innerHTML = `<div class="item-list-empty">ไม่มีรายการในสต็อก</div>`;
      return;
    }
    container.innerHTML = list.map(it => `
      <div class="item-list-row ${it.id === selectedDeleteId ? 'selected' : ''}" onclick="selectDeleteItem('${it.id}')">
        <span>${escapeHtml(it.name)}</span>
        <span class="n">${it.qty}</span>
      </div>
    `).join('');
  }

  function selectDeleteItem(id){
    selectedDeleteId = id;
    renderDeleteList();
  }

  function submitDelete(){
    if(!selectedDeleteId){
      showToast('กรุณาเลือกรายการก่อน');
      return;
    }
    const item = items.find(it => it.id === selectedDeleteId);
    items = items.filter(it => it.id !== selectedDeleteId);
    saveItems();
    renderTable();
    showToast(item ? `ลบ ${item.name} แล้ว` : 'ลบรายการแล้ว');
    closeModal('deleteOverlay');
  }

  // ---------- Reset ----------
  function openResetModal(){
    document.getElementById('resetOverlay').classList.add('show');
  }

  function submitReset(){
    items = [];
    saveItems();
    renderTable();
    showToast('รีเซ็ตตารางแล้ว');
    closeModal('resetOverlay');
  }

  // ---------- Modal helpers ----------
  function closeModal(id){
    document.getElementById(id).classList.remove('show');
  }
  document.querySelectorAll('.overlay').forEach(ov => {
    ov.addEventListener('click', (e) => {
      if(e.target === ov) ov.classList.remove('show');
    });
  });

  // init
  loadItems();
  renderTable();

  // register service worker for offline use (standalone app)
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
</script>

</body>
</html>
